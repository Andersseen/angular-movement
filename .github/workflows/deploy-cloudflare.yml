name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: cloudflare-pages-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  CLOUDFLARE_PROJECT_NAME: angular-movement

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'Preview' || 'Production' }}
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build:prod

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          [[ -n "${CLOUDFLARE_API_TOKEN}" ]] || { echo "Missing CLOUDFLARE_API_TOKEN secret"; exit 1; }
          [[ -n "${CLOUDFLARE_ACCOUNT_ID}" ]] || { echo "Missing CLOUDFLARE_ACCOUNT_ID secret"; exit 1; }

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/angular-movement/browser --project-name "${{ env.CLOUDFLARE_PROJECT_NAME }}"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
