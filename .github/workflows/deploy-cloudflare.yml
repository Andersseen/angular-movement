name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: cloudflare-pages-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  CLOUDFLARE_PROJECT_NAME: angular-movement

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'Preview' || 'Production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build:prod

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          [[ -n "${CLOUDFLARE_API_TOKEN}" ]] || { echo "Missing CLOUDFLARE_API_TOKEN secret"; exit 1; }
          [[ -n "${CLOUDFLARE_ACCOUNT_ID}" ]] || { echo "Missing CLOUDFLARE_ACCOUNT_ID secret"; exit 1; }

      - name: Verify build output
        run: |
          if [ ! -d "dist/analog/public" ]; then
            echo "❌ Build output directory dist/analog/public does not exist"
            ls -la dist/analog/ 2>/dev/null || echo "dist/analog/ does not exist"
            exit 1
          fi
          echo "✅ Build output verified"

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          COMMIT_MSG=$(printf '%s' "${{ github.event.head_commit.message || github.event.pull_request.title || 'Deploy' }}" | head -c 200)
          pnpm exec wrangler pages deploy dist/analog/public \
            --project-name="${{ env.CLOUDFLARE_PROJECT_NAME }}" \
            --branch="${{ github.head_ref || github.ref_name }}" \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${COMMIT_MSG}"
          echo "✅ Deploy completed"
