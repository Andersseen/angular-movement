name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint App
      run: pnpm run lint

    - name: Lint Library
      run: npx ng lint movement

    - name: Build Library
      run: npx ng build movement

    - name: Build App
      run: pnpm run build:prod

    - name: Run Tests
      run: pnpm run test:coverage
